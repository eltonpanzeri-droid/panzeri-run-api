server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location /manifest.json {
    add_header Cache-Control "no-store";
  }

  location /sw.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  # Repassa chamadas de API pelo mesmo dominio do app. Alguns bloqueadores de anuncio/DNS
  # tratam qualquer subdominio contendo "api" como rastreador e derrubam a conexao antes
  # dela sair do aparelho, mesmo com internet normal — isso nunca aparece no log do backend
  # porque a chamada nunca chega la. Repassando pela mesma origem que o app ja carrega,
  # o navegador nunca precisa falar diretamente com o dominio "-api.".
  location /api/ {
    proxy_pass http://agenteselton_panzeri-run-api:3333/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
